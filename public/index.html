<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker</title>
    <link rel="icon"  href="https://cdn-icons-png.flaticon.com/512/5501/5501375.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
   <nav>
    <h2>ExpenseTracker</h2>
    <div id="user-info" style="display: flex; align-items: center; gap: 10px;">
        <span id="display-email" style="font-weight: 600; color: #fff;"></span>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

    <div class="dashboard-wrapper">
        <div class="row">
            <div class="container card">
                <h3>Log Transaction</h3>
                <form id="expense-form">
                    <input type="text" id="desc" placeholder="Expense Name" required>
                    <input type="number" id="amount" placeholder="Amount (₹)" required>
                    

                    <div class="status-toggle">
                        <label><input type="radio" name="status" value="Spent" checked><span class="toggle-btn">Spent</span></label>
                        <label><input type="radio" name="status" value="Pending"><span class="toggle-btn">Pending</span></label>
                    </div>
                    
                    <button type="submit">Add Entry</button>
                </form>
            </div>

            <div class="container card">
                <div class="stats-header">
                    <h3>📊 Analytics</h3>
                    <h2 id="total-balance">₹0.00</h2>
                </div>
                <div class="chart-box">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="container card">
                <h3>📜 Recent History</h3>
                <ul id="expense-list"></ul>
            </div>

            <div class="container card">
                <h3>📌 Pending Summary</h3>
                <div id="pending-list"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ExpenseTracker Dashboard | Full Stack Internship Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
