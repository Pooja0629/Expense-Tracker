<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        *{ margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body{
            background: linear-gradient(to right, #bae6fd, #e0f2fe);
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .container{
            background-color: #fff; border-radius: 30px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
            width: 768px; max-width: 100%; min-height: 480px; position: relative;
        }
        .form-container{ padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .container button{ background-color: #0284c7; color: #fff; padding: 10px 50px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        .container input{ background-color: #eee; border: none; margin: 8px 0; padding: 10px 15px; border-radius: 8px; width: 100%; outline: none; }
        .back-link { margin-top: 15px; color: #0284c7; text-decoration: none; font-weight: 500; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .message.success { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <form id="resetPasswordForm">
                <h1>Reset Your Password</h1>
                <p>Enter your email and create a new password.</p>
                <input type="email" id="resetEmail" placeholder="Email" required>
                <input type="password" id="resetNewPassword" placeholder="New Password" required>
                <input type="password" id="resetConfirmPassword" placeholder="Confirm Password" required>
                <button type="submit">Reset Password</button>
                <div id="resetMessage" class="message"></div>
                <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </form>
        </div>
    </div>
    <script>
        // Use the same script logic you had before
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('resetMessage');
            msg.textContent = 'Password reset successfully!';
            msg.className = 'message success';
            msg.style.display = 'block';
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        });
    </script>
</body>
</html>
